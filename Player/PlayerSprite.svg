<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 64">
  <!-- Player with Long Sword - 4 poses for swing animation -->
  <!-- Frame 0: Idle/Start -->
  <rect x="16" y="0" width="32" height="64" fill="#4a90d9"/>
  <circle cx="32" cy="12" r="10" fill="#ffcc99"/>
  <rect x="24" y="24" width="16" height="24" fill="#2d5a87"/>
  <rect x="22" y="24" width="6" height="20" fill="#2d5a87"/>
  <rect x="34" y="24" width="6" height="20" fill="#2d5a87"/>
  <rect x="24" y="48" width="6" height="16" fill="#1a3a5c"/>
  <rect x="34" y="48" width="6" height="16" fill="#1a3a5c"/>
  <!-- Sword at rest -->
  <rect x="48" y="12" width="4" height="44" fill="#888"/>
  <rect x="46" y="8" width="8" height="8" fill="#666"/>

  <!-- Frame 1: Wind up (sword back) -->
  <rect x="80" y="0" width="32" height="64" fill="#4a90d9"/>
  <circle cx="96" cy="12" r="10" fill="#ffcc99"/>
  <rect x="88" y="24" width="16" height="24" fill="#2d5a87"/>
  <rect x="84" y="24" width="8" height="20" fill="#2d5a87"/>
  <rect x="100" y="24" width="6" height="20" fill="#2d5a87"/>
  <rect x="88" y="48" width="6" height="16" fill="#1a3a5c"/>
  <rect x="98" y="48" width="6" height="16" fill="#1a3a5c"/>
  <!-- Sword raised back -->
  <rect x="68" y="4" width="4" height="44" fill="#888"/>
  <rect x="66" y="0" width="8" height="8" fill="#666"/>
  <rect x="70" y="48" width="4" height="6" fill="#8b4513"/>

  <!-- Frame 2: Swing (sword forward mid) -->
  <rect x="144" y="0" width="32" height="64" fill="#4a90d9"/>
  <circle cx="160" cy="12" r="10" fill="#ffcc99"/>
  <rect x="152" y="24" width="16" height="24" fill="#2d5a87"/>
  <rect x="148" y="26" width="8" height="16" fill="#2d5a87"/>
  <rect x="168" y="20" width="14" height="4" fill="#888"/>
  <rect x="170" y="48" width="6" height="16" fill="#1a3a5c"/>
  <rect x="182" y="50" width="6" height="14" fill="#1a3a5c"/>
  <!-- Sword swinging forward -->
  <rect x="136" y="16" width="4" height="40" fill="#aaa"/>
  <rect x="134" y="12" width="8" height="8" fill="#666"/>
  <rect x="136" y="56" width="4" height="6" fill="#8b4513"/>

  <!-- Frame 3: Slash complete (sword extended) -->
  <rect x="208" y="0" width="32" height="64" fill="#4a90d9"/>
  <circle cx="224" cy="12" r="10" fill="#ffcc99"/>
  <rect x="216" y="24" width="16" height="24" fill="#2d5a87"/>
  <rect x="212" y="28" width="8" height="14" fill="#2d5a87"/>
  <rect x="232" y="28" width="6" height="14" fill="#2d5a87"/>
  <rect x="216" y="48" width="6" height="12" fill="#1a3a5c"/>
  <rect x="226" y="48" width="6" height="12" fill="#1a3a5c"/>
  <!-- Sword fully extended -->
  <rect x="240" y="8" width="4" height="48" fill="#aaa"/>
  <rect x="238" y="4" width="8" height="8" fill="#666"/>
  <rect x="240" y="56" width="4" height="6" fill="#8b4513"/>
</svg>